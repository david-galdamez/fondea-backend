spring.application.name=fondea
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always

jwt_secret=${JWT_SECRET}
api.key=${API_KEY}

server.port=${PORT:${SERVER_PORT:8080}}

admin.name=${ADMIN_NAME}
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${MAIL_FROM}

google.sheets.enabled=${GOOGLE_SHEETS_ENABLED:false}
google.sheets.credentials-path=${GOOGLE_SHEETS_CREDENTIALS_PATH:}
google.sheets.spreadsheet-id=${GOOGLE_SHEETS_SPREADSHEET_ID:}
google.sheets.range=${GOOGLE_SHEETS_RANGE:Campaigns!A1}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:4200}